version: '3.8'

services:
  frontend:
    build: ./frontend
    container_name: bakeryos-frontend
    restart: always
    environment:
      - REACT_APP_BACKEND_URL=https://pasticceriamodena.andreasalardi.it
    expose:
      - "3000"

  backend:
    build: ./backend
    container_name: bakeryos-backend
    restart: always
    env_file: .env
    environment:
      - MONGO_URL=mongodb://mongo:27017
      - DB_NAME=bakeryos_production
      # Force absolute production URL for redirects
      - GOOGLE_REDIRECT_URI=https://pasticceriamodena.andreasalardi.it/api/auth/callback
      - CORS_ORIGINS=https://pasticceriamodena.andreasalardi.it
    expose:
      - "8001"
    depends_on:
      - mongo

  mongo:
    image: mongo:6.0
    container_name: bakeryos-mongo
    restart: always
    volumes:
      - mongo_data:/data/db

  nginx:
    image: nginx:alpine
    container_name: bakeryos-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - frontend
      - backend

  certbot:
    image: certbot/certbot
    container_name: bakeryos-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot

volumes:
  mongo_data:
